repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Linter
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: Ruff Formatter
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: MyPy Type Checker
        entry: uv run mypy
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        args: ["src"]